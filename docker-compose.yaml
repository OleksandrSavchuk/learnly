services:

  learnly:
    container_name: learnly
    build: .
    depends_on:
      - db
    ports:
      - "${PORT}:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
    networks:
      - learnly-network

  db:
    container_name: learnly-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - learnly-postgres-volume:/var/lib/postgresql/data
    networks:
      - learnly-network

volumes:
  learnly-postgres-volume:
  learnly-minio-volume:

networks:
  learnly-network:
    driver: bridge